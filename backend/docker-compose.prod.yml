version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: questionnaire-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - questionnaire-network-prod
    security_opt:
      - no-new-privileges:true
    read_only: true

  redis:
    image: redis:7-alpine
    container_name: questionnaire-redis-prod
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - questionnaire-network-prod
    security_opt:
      - no-new-privileges:true
    read_only: true
    command: redis-server --save 900 1 --save 300 10 --save 60 10000 --appendonly yes

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: questionnaire-backend-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT}:3000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SYNCHRONIZE: false
      DB_SSL: ${DB_SSL:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CORS_ORIGINS: ${CORS_ORIGINS}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - questionnaire-network-prod
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 512m
    cpus: '1.0'

  nginx:
    image: nginx:alpine
    container_name: questionnaire-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    networks:
      - questionnaire-network-prod
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: true

networks:
  questionnaire-network-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local