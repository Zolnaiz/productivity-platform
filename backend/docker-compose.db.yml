services:
  postgres:
    image: postgres:15-alpine
    container_name: productivity-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-questionnaire_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - productivity_postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-questionnaire_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  productivity_postgres_data:
