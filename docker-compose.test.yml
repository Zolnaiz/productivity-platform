services:
  postgres:
    image: postgres:15-alpine
    container_name: productivity-postgres-test
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: productivity_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d productivity_test"]
      interval: 5s
      timeout: 5s
      retries: 10
