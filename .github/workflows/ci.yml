name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --runInBand

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=moderate

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- run

      - name: Lint
        run: npm run lint:check

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --audit-level=moderate

  docker-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate default production compose
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml config > /dev/null

      - name: Validate cache production profile
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml --profile cache config > /dev/null

      - name: Validate backup production profile
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml --profile backup config > /dev/null

      - name: Validate monitoring production profile
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml --profile monitoring config > /dev/null
