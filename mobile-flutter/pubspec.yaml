name: productivity_mobile
description: Productivity Platform Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3

  # Networking
  dio: ^5.3.3
  http: ^1.2.2
  connectivity_plus: ^5.0.1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Environment
  flutter_dotenv: ^5.2.1

  # UI Components
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  badges: ^3.0.1
  lottie: ^3.1.0
  animations: ^2.0.7

  # Forms & Validation
  flutter_form_builder: ^10.0.0
  form_validator: ^2.0.1
  image_picker: ^1.0.4
  file_picker: ^6.1.1

  # Navigation
  go_router: ^17.0.0
  auto_route: ^7.4.0

  # Charts & Graphs
  fl_chart: ^0.70.0
  syncfusion_flutter_charts: ^23.2.10

  # Date & Time
  table_calendar: ^3.0.9
  date_time_picker: ^3.1.0

  # Icons
  cupertino_icons: ^1.0.6
  line_icons: ^2.0.2
  font_awesome_flutter: ^10.6.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0

  # Notifications
  flutter_local_notifications: ^15.2.0
  firebase_messaging: ^14.7.10

  # QR Code
  qr_flutter: ^4.2.0
  barcode_widget: ^2.0.3

  # PDF & Excel
  pdf: ^3.10.2
  excel: ^3.0.2
  printing: ^5.11.2

  # Social Sharing
  share_plus: ^7.0.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.2
  build_runner: ^2.4.7
  auto_route_generator: ^7.4.0
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env.example
