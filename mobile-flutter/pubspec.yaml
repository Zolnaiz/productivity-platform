name: productivity_mobile
description: Productivity Platform Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  provider: ^6.1.1
  flutter_bloc: ^9.1.1

  # Networking
  dio: ^5.3.3
  http: ^1.2.2
  connectivity_plus: ^7.1.1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Environment
  flutter_dotenv: ^6.0.1

  # UI Components
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  badges: ^3.0.1
  lottie: ^3.1.0
  animations: ^2.0.7

  # Forms & Validation
  flutter_form_builder: ^10.0.0
  form_validator: ^2.0.1
  image_picker: ^1.0.4
  file_picker: ^12.0.0-beta.5

  # Navigation
  go_router: ^17.0.0

  # Charts & Graphs
  fl_chart: ^1.2.0
  syncfusion_flutter_charts: ^33.2.13

  # Date & Time
  table_calendar: ^3.0.9

  # Icons
  cupertino_icons: ^1.0.6
  line_icons: ^2.0.2
  font_awesome_flutter: ^11.0.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.3

  # Notifications
  flutter_local_notifications: ^22.0.1
  firebase_messaging: ^16.3.0

  # PDF & Excel
  pdf: ^3.10.2
  printing: ^5.11.2

  # Social Sharing
  share_plus: ^13.1.0
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.2
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env.example
