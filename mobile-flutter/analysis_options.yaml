# This file configures the static analysis results for your project.
# include: package:flutter_lints/flutter.yaml  (uncomment after running `flutter pub get`)

# Additional linting rules
linter:
  rules:
    # Keep a small, stable set of lint rules (flutter_lints provides the rest)
    - avoid_print
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables

# Analyzer configuration
analyzer:
  # Exclude generated files
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/*.mocks.dart"
    - "build/**"
    - ".dart_tool/**"
    - ".idea/**"
    - ".vscode/**"

  # Language features
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  # Strong-mode options
  strong-mode:
    implicit-casts: false
    implicit-dynamic: false

# Code formatting rules
formatting:
  # Line length
  line-length: 80

  # Indent size
  indent-size: 2

  # Use tabs
  use-tabs: false
