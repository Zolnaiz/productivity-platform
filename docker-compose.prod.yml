services:
  postgres:
    image: postgres:15-alpine
    container_name: productivity-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:?Set DB_USERNAME in .env.production}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.production}
      POSTGRES_DB: ${DB_DATABASE:?Set DB_DATABASE in .env.production}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - productivity-network-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:?Set DB_USERNAME} -d ${DB_DATABASE:?Set DB_DATABASE}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: productivity-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:?Set DB_USERNAME in .env.production}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.production}
      DB_DATABASE: ${DB_DATABASE:?Set DB_DATABASE in .env.production}
      DB_SYNCHRONIZE: "false"
      DB_MIGRATIONS_RUN: ${DB_MIGRATIONS_RUN:-true}
      DB_LOGGING: ${DB_LOGGING:-false}
      DB_SSL: ${DB_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env.production}
      ENABLE_SWAGGER: "false"
      ENABLE_METRICS: ${ENABLE_METRICS:-false}
      ALLOW_PUBLIC_OPERATIONS: "false"
      RATE_LIMIT_TTL_MS: ${RATE_LIMIT_TTL_MS:-60000}
      RATE_LIMIT_LIMIT: ${RATE_LIMIT_LIMIT:-120}
    networks:
      - productivity-network-prod
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => { if (r.statusCode !== 200) process.exit(1); process.exit(0); }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL in .env.production}
        VITE_ENABLE_DEMO_MODE: ${VITE_ENABLE_DEMO_MODE:-false}
    container_name: productivity-admin-web-prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3001}:3001"
    networks:
      - productivity-network-prod
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: productivity-redis-prod
    restart: unless-stopped
    profiles: ["cache"]
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env.production}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - productivity-network-prod

  backup:
    image: prodrigestivill/postgres-backup-local:latest
    container_name: productivity-backup-prod
    restart: unless-stopped
    profiles: ["backup"]
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_DATABASE:?Set DB_DATABASE in .env.production}
      POSTGRES_USER: ${DB_USERNAME:?Set DB_USERNAME in .env.production}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.production}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - productivity-network-prod

  prometheus:
    image: prom/prometheus:latest
    container_name: productivity-prometheus-prod
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - productivity-network-prod

  grafana:
    image: grafana/grafana:latest
    container_name: productivity-grafana-prod
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env.production}
    ports:
      - "${GRAFANA_PORT:-3003}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - productivity-network-prod

volumes:
  postgres_data_prod:
  redis_data_prod:
  prometheus_data:
  grafana_data:

networks:
  productivity-network-prod:
    driver: bridge
